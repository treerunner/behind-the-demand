name: EPA ECHO Scrape

on:
  schedule:
    # First day of every month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print without writing to database)'
        type: boolean
        default: false

jobs:
  scrape:
    name: Scrape EPA ECHO
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env for CMS
        run: |
          cat <<EOF > apps/cms/.env
          DATABASE_URI=${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SERVER_URL=https://cms.behindthedemand.org
          EOF

      - name: Download ECHO Exporter (~392 MB, updated weekly by EPA)
        run: |
          curl -L --retry 3 --retry-delay 10 -o /tmp/echo_exporter.zip \
            "https://echo.epa.gov/files/echodownloads/echo_exporter.zip"
          mkdir -p /tmp/echo_data
          unzip -d /tmp/echo_data /tmp/echo_exporter.zip
          CSV=$(ls /tmp/echo_data/*.csv | head -1)
          echo "ECHO_CSV_PATH=$CSV" >> $GITHUB_ENV
          echo "Extracted: $CSV"
          wc -l "$CSV"

      - name: Run EPA ECHO scraper
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm --filter @btd/data-collection echo:dry
          else
            pnpm --filter @btd/data-collection echo
          fi

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "ECHO scrape failed: $(date -u '+%Y-%m-%d')" \
            --label "bug,data-pipeline" \
            --body "## Scrape failure

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')

          The scheduled EPA ECHO scrape failed. Check the run log above for the error.

          cc @${{ github.repository_owner }}"
