name: FracTracker Scrape

on:
  schedule:
    # Every Monday at 09:00 UTC (after EDGAR at 08:00)
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print without writing to database)'
        type: boolean
        default: false

jobs:
  scrape:
    name: Scrape FracTracker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env for CMS
        run: |
          cat <<EOF > apps/cms/.env
          DATABASE_URI=${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SERVER_URL=https://cms.behindthedemand.org
          EOF

      - name: Run FracTracker scraper
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm --filter @btd/data-collection fractracker:dry
          else
            pnpm --filter @btd/data-collection fractracker
          fi

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "FracTracker scrape failed: $(date -u '+%Y-%m-%d')" \
            --label "bug,data-pipeline" \
            --body "## Scrape failure

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Date:** $(date -u '+%Y-%m-%d %H:%M UTC')

          The scheduled FracTracker scrape failed. Check the run log above for the error.

          cc @${{ github.repository_owner }}"
